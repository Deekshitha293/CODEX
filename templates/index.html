<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask Music Player</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="container">
        <h1>Music Player</h1>
        <p class="subtitle">Simple Flask + HTML5 audio demo</p>

        <section class="song-list">
            {% for song in songs %}
            <article class="song-card">
                <h2>{{ song.title }}</h2>
                <audio id="audio-{{ loop.index }}" src="{{ url_for('static', filename='music/' + song.filename) }}"></audio>
                <div class="controls">
                    <button type="button" onclick="document.getElementById('audio-{{ loop.index }}').play()">Play</button>
                    <button type="button" onclick="document.getElementById('audio-{{ loop.index }}').pause()">Pause</button>
                </div>
            </article>
            {% endfor %}
        </section>
    </main>
</body>
</html>
